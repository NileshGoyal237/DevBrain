name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Backend tests with PostgreSQL + Redis services
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devbrain
          POSTGRES_PASSWORD: devbrain_secret
          POSTGRES_DB: devbrain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devbrain"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Tests use SQLite in-memory — these are kept for smoke-test scenarios
      DATABASE_URL: postgresql+asyncpg://devbrain:devbrain_secret@localhost:5432/devbrain_test
      REDIS_URL: redis://localhost:6379/15
      XAI_API_KEY: test-xai-key-ci
      GITHUB_CLIENT_ID: test-gh-client-id
      GITHUB_CLIENT_SECRET: test-gh-client-secret
      GITHUB_REDIRECT_URI: http://localhost:8000/auth/callback
      SECRET_KEY: ci-secret-key-at-least-32-chars!!
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CHROMA_PERSIST_DIR: /tmp/chroma_ci
      TAVILY_API_KEY: test-tavily-key-ci
      ENVIRONMENT: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install test extras
        run: pip install pytest pytest-asyncio pytest-cov httpx aiosqlite

      - name: Wait for Postgres to be ready
        run: |
          until pg_isready -h localhost -U devbrain; do
            echo "Waiting for Postgres..."; sleep 2
          done

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            -v \
            --asyncio-mode=auto \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Python linting with Ruff
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check backend/

      - name: Run Ruff formatter check
        run: ruff format --check backend/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Frontend build verification
  # ──────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check --if-present

      - name: Build Next.js application
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Verify standalone output exists
        run: test -f frontend/.next/standalone/server.js