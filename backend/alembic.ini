# backend/alembic.ini
# Alembic configuration file.
# The sqlalchemy.url here is a placeholder — it is overridden at runtime
# by alembic/env.py which reads DATABASE_URL from core.config.settings.

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepend — blank means the directory containing alembic.ini
# is added to sys.path automatically by Alembic
prepend_sys_path = .

# Timezone to use when rendering timestamps in migration file names
timezone = UTC

# Max length of the slug field in auto-generated migration names
truncate_slug_length = 40

# Revision identifier resolution — "branchpoint" for linear history
revision_environment = false
sourceless = false

# Version locations — single directory (default)
version_locations = %(here)s/alembic/versions

# The Logging configuration is below.  Alembic overrides the root
# logger only when invoked directly via the CLI.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S